<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body><!-- webpage -->

    <div class="calculator"><!-- CalculatorUI -->
        <div class="result"><!-- Result screen -->
            <div class="options">
                <button class="ham"><!-- 1st -->
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
            <div class="inputDisplay"></div><!-- 2nd -->
            <div class="outputDisplay">0</div><!-- 3rd -->
        </div>

        <!-- DIVISION -->

        <div class="numPad"><!-- buttons -->

            <button id="ac-btn" class="shadow-btn">AC</button>
            <button id="sign-btn" class="shadow-btn">+/-</button>
            <button id="percent-btn" class="shadow-btn">%</button>
            <button id="div-btn" class="orange-btn">/</button>

            <button class="num-btn">7</button>
            <button class="num-btn">8</button>
            <button class="num-btn">9</button>
            <button id="multi-btn" class="orange-btn">*</button>

            <button class="num-btn">4</button>
            <button class="num-btn">5</button>
            <button class="num-btn">6</button>
            <button id="sub-btn" class="orange-btn">-</button>

            <button class="num-btn">1</button>
            <button class="num-btn">2</button>
            <button class="num-btn">3</button>
            <button id="add-btn" class="orange-btn">+</button>

            <button class="fa-solid fa-calculator"></button>
            <button class="num-btn">0</button>
            <button class="num-btn">.</button>
            <button id="equal-btn" class="orange-btn">=</button>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
